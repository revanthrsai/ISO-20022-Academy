backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "articles"
    label: "Library Articles"
    folder: "content"
    create: true
    slug: "{{id}}"
    fields:
      - { label: "Article ID", name: "id", widget: "string", hint: "e.g., 101-nostro-vostro" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Level (e.g., 101, 201)", name: "level", widget: "number" }
      - { label: "Category", name: "category", widget: "select", options: ["Fundamentals", "Messaging", "Exceptions"] }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Minutes to Read", name: "minutes", widget: "number", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
