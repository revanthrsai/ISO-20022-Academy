[build]
  functions = "netlify/functions"
  # Regenerate the Library registry from /content frontmatter on every deploy.
  command = "node scripts/build-toc.js"
  publish = "."

# Let /admin and its assets be served as real files, never rewritten
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# SPA fallback for the public site
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
